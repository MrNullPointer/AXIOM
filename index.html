<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#05060a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f3ec" media="(prefers-color-scheme: light)" />
    <meta
      name="description"
      content="Axiom — a visual encyclopedia of computer architecture. From electrons to execution."
    />
    <title>Axiom — From electrons to execution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Avoid theme flash: read stored theme + system pref before paint.
      (function () {
        try {
          var stored = localStorage.getItem('axiom-theme');
          var sys = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          var t = stored === 'light' || stored === 'dark' ? stored : sys;
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
